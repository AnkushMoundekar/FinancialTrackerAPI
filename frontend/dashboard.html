<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <!-- Added Bootstrap CSS & Icons for a modern look -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-light bg-white border-bottom px-4 py-3">
    <div class="container-fluid p-0 d-flex justify-content-between align-items-center">
        
        <!-- Brand Logo & Icon -->
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-primary fs-4 m-0" href="#">
            <i class="bi bi-wallet2 text-gradient"></i>
            <span>FinTrack</span>
        </a>

        <!-- Clean Action Button -->
        <button id="logoutBtn" class="btn btn-outline-danger d-flex align-items-center gap-2 px-3 py-2 fw-medium rounded-3 transition-all">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
        </button>

    </div>
</nav>
<div id="loading" class="text-center mt-4">
    <p>Loading...</p>
</div>
<div class="container mt-5">

    <!-- Header Grid with Action Button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard</h2>
        <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#addTransactionModal">
            <i class="bi bi-plus-circle"></i> Add Expense
        </button>
    </div>

    <!-- Summary Cards -->
    <div class="row g-3 mb-5">
        <div class="col-md-6">
            <div class="card p-3 shadow-sm border-start border-danger border-4">
                <h5 class="text-muted">Total Expense</h5>
                <h3 class="text-danger">₹<span id="totalExpense">0</span></h3>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 shadow-sm border-start border-success border-4">
                <h5 class="text-muted">Total Income</h5>
                <h3 class="text-success">₹<span id="totalIncome">0</span></h3>
            </div>
        </div>
    </div>

    <!-- Expenses Table Card -->
    <div class="card p-4 shadow-sm">
        <h4 class="mb-4">Expenses</h4>

        <!-- Filters -->
        <div class="row g-2 mb-4">
            <div class="col-md-3">
                <select id="filterType" class="form-select">
                    <option value="">All Types</option>
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
            </div>

            <div class="col-md-3">
                <input type="date" id="startDate" class="form-control" />
            </div>

            <div class="col-md-3">
                <input type="date" id="endDate" class="form-control" />
            </div>

            <div class="col-md-3">
                <button class="btn btn-secondary w-100" id="applyFilter">Apply Filter</button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Amount</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="expenseTable"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between mt-3">
            <button class="btn btn-outline-primary btn-sm" id="prevBtn">Previous</button>
            <button class="btn btn-outline-primary btn-sm" id="nextBtn">Next</button>
        </div>
    </div>

</div>

<!-- Pop-up Modal Form -->
<div class="modal fade" id="addTransactionModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add New Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="expenseForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Amount</label>
                        <input class="form-control" type="number" id="amount" placeholder="0.00" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Type</label>
                        <select class="form-select" id="type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Description</label>
                        <input class="form-control" type="text" id="description" placeholder="e.g., Groceries, Salary" />
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Date</label>
                        <input class="form-control" type="date" id="date" required />
                    </div>

                    <div class="d-grid mt-4">
                        <!-- Added data-bs-dismiss="modal" to close form on submit if handled by JS -->
                        <button type="submit" class="btn btn-primary py-2" data-bs-dismiss="modal">Add Expense</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="row g-4 mt-4">
    
    <!-- Category Breakdown Card -->
    <div class="col-md-6">
        <div class="card h-100 p-4 border-0 shadow-sm hover-card">
            <div class="d-flex align-items-center mb-3">
                <div class="icon-shape bg-primary-subtle text-primary rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                    <i class="bi bi-pie-chart-fill fs-5"></i>
                </div>
                <h5 class="card-title mb-0 fw-bold text-dark">Category Breakdown</h5>
            </div>
            <!-- Wrapped canvas to enforce strict height limits -->
            <div class="chart-container" style="position: relative; height: 280px; width: 100%;">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Monthly Spending Card -->
    <div class="col-md-6">
        <div class="card h-100 p-4 border-0 shadow-sm hover-card">
            <div class="d-flex align-items-center mb-3">
                <div class="icon-shape bg-success-subtle text-success rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                    <i class="bi bi-bar-chart-line-fill fs-5"></i>
                </div>
                <h5 class="card-title mb-0 fw-bold text-dark">Monthly Spending</h5>
            </div>
            <div class="chart-container" style="position: relative; height: 280px; width: 100%;">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>
    </div>

</div>
<!-- Required Bootstrap JS Bundle (Includes Popper for Modal handling) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="./scripts/dashboard.js"></script>

</body>
</html>
