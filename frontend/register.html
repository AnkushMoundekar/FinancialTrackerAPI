<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow-sm col-md-4 mx-auto">
        <h3 class="text-center">Register</h3>

        <form id="registerForm">
            <input class="form-control mb-3" type="email" id="register-email" placeholder="Email" required />
            <input class="form-control mb-3" type="password" id="register-password" placeholder="Password" required />

            <button type = "submit" class="btn btn-primary w-100">Register</button>
        </form>

        <p class="mt-3 text-center">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>


</body>
<script type="module" src="./scripts/auth.js"></script>
</html>
